server:
  port: 8090

spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        - id: ms-stock
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/stock/**

        - id: ms-usuario
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/usuarios/**

        - id: ms-facturacion
          uri: http://localhost:8091
          predicates:
            - Path=/api/facturas/**

        - id: ms-itemcotizador
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/items/**

        - id: ms-notificacion
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/notificaciones/**

        - id: ms-proveedor
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/proveedores/**

        - id: ms-categoria
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/categorias/**

        - id: ms-cliente
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/clientes/**

        - id: ms-cotizador
          uri: http://localhost:8089
          predicates:
            - Path=/api/cotizaciones/**

        - id: ms-equipo
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/equipos/**