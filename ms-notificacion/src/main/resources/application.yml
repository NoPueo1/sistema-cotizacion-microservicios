server:
  port: 8085

spring:
  application:
    name: ms-notificacion
  datasource:
    url: jdbc:mysql://localhost:3306/db_notificaciones?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true